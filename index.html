<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNTIK LIKE FREE FIRE OB53 🔥</title>

<style>
body {
    margin:0;
    font-family: Arial;
    color:white;
    text-align:center;
    background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
}

h1 { margin-top:20px; }

.notice {
    background: rgba(255,0,0,0.2);
    padding:10px;
    margin:10px;
    border-radius:10px;
}

.container {
    display:grid;
    grid-template-columns: repeat(2,1fr);
    gap:15px;
    padding:20px;
}

.card {
    border:2px solid rgba(255,255,255,0.2);
    border-radius:15px;
    padding:20px;
}

button {
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    cursor:pointer;
}

input {
    padding:10px;
    border-radius:10px;
    border:none;
    width:80%;
    margin-top:20px;
}

/* loading */
#loading, #success {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000000dd;
}

/* QR */
#qrisBox {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000000ee;
}

.qrContent {
    margin-top:80px;
}

.qrContent img {
    width:250px;
    border-radius:10px;
}

h2 { color:#00ffcc; }
</style>
</head>

<body>

<h1>SUNTIK LIKE FREE FIRE OB53 🔥</h1>
<div class="notice"> BY SENDI</div>

<input type="text" id="ffid" placeholder="Masukan ID Free Fire">

<div class="container">
<div class="card"><h3>❤️ 20 Likes</h3><p>Rp 850</p><button onclick="pilih(850)">Pilih</button></div>
<div class="card"><h3>❤️ 100 Likes</h3><p>Rp 4.000 habis </p><button onclick="pilih(4000)">Pilih</button></div>
<div class="card"><h3>❤️ 220 Likes</h3><p>Rp 8.500 habis </p><button onclick="pilih(8500)">Pilih</button></div>
<div class="card"><h3>❤️ 1000 Likes</h3><p>Rp 16.000
habis</p><button onclick="pilih(16000)">Pilih</button></div>
</div>

<button onclick="bayar()">Bayar</button>

<!-- loading -->
<div id="loading">
<p style="margin-top:200px;">Memproses pembayaran...</p>
</div>

<!-- QRIS -->
<div id="qrisBox">
<div class="qrContent">
<h2>Scan QRIS</h2>

<img src="https://files.catbox.moe/tqni2l.jpg">

<h2 id="nominal"></h2>

<p>Gunakan DANA / OVO / GOPAY</p>

<button onclick="sudahBayar()">Saya sudah bayar</button>
<br><br>
<button onclick="tutup()">Tutup</button>
</div>
</div>

<!-- sukses -->
<div id="success">
<h1 style="margin-top:200px;">✅ Pembayaran Berhasil</h1>
<p>Like sedang diproses...</p>
</div>

<script>
let harga = 0;

function pilih(h){
    harga = h;
    alert("Dipilih Rp " + h);
}

function bayar(){
    let id = document.getElementById("ffid").value;

    if(id == "") return alert("Masukan ID dulu!");
    if(harga == 0) return alert("Pilih paket dulu!");

    document.getElementById("loading").style.display = "block";

    setTimeout(()=>{
        document.getElementById("loading").style.display = "none";
        document.getElementById("qrisBox").style.display = "block";
        document.getElementById("nominal").innerText = "Total: Rp " + harga;
    },1500);
}

function sudahBayar(){
    document.getElementById("qrisBox").style.display = "none";
    document.getElementById("success").style.display = "block";

    setTimeout(()=>{
        location.reload();
    },4000);
}

function tutup(){
    document.getElementById("qrisBox").style.display = "none";
}
</script>

</body>
</html>
